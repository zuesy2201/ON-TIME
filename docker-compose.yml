version: '3.8'\n\nservices:\n  backend:\n    image: node:14\n    container_name: on_time_backend\n    restart: unless-stopped\n    working_dir: /app\n    volumes:\n      - .:/app\n    command: npm start\n    environment:\n      - DATABASE_URL=postgresql://username:password@db:5432/on_time\n      - REDIS_URL=redis://redis:6379\n      - MONGODB_URI=mongodb://mongo:27017/on_time\n\n  db:\n    image: postgres:13\n    container_name: on_time_db\n    restart: unless-stopped\n    environment:\n      POSTGRES_USER: username\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: on_time\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n\n  redis:\n    image: redis:alpine\n    container_name: on_time_redis\n    restart: unless-stopped\n\n  mongo:\n    image: mongo:latest\n    container_name: on_time_mongo\n    restart: unless-stopped\n    volumes:\n      - mongodbdata:/data/db\n\nvolumes:\n  pgdata:\n  mongodbdata: